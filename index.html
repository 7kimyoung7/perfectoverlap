<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Overlap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            background-color: #0f172a; /* slate-900 */
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        .piece-container {
            transition: transform 0.1s;
            transform-origin: top left;
        }
        .piece-container:hover {
            transform: scale(1.05);
            z-index: 20;
        }
        .piece-container:active {
            cursor: grabbing;
        }
        .ghost {
            pointer-events: none;
            z-index: 50;
            transition: all 0.075s ease-out;
        }
        /* Custom scrollbar for inventory */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center overflow-auto p-4">

    <!-- Timer -->
    <div id="timer" class="absolute top-4 left-4 bg-slate-800 text-amber-500 px-4 py-2 rounded-lg border border-slate-700 font-mono text-xl font-bold shadow-lg z-50">
        ⏱ 00:00
    </div>

    <!-- Header -->
    <div class="mb-4 mt-2 text-center">
        <h1 class="text-3xl font-bold text-white mb-2 tracking-widest uppercase" style="text-shadow: 0 0 10px #fbbf24;">
            完美重叠
        </h1>
    </div>

    <!-- Main Game Area -->
    <div class="flex flex-col md:flex-row gap-6 items-start justify-center w-full max-w-[1400px]">
        
        <!-- Board Area -->
        <div id="board-container" class="relative bg-slate-800/50 rounded-lg p-2 border-2 border-slate-700 shadow-2xl shrink-0 mx-auto">
            <!-- Grid Background -->
            <div id="grid-background" class="grid relative">
                <!-- Cells generated by JS -->
            </div>
            
            <!-- Pieces Layer -->
            <div id="board-pieces-layer" class="absolute top-0 left-0 w-full h-full pointer-events-none">
                <!-- Placed pieces go here -->
            </div>

            <!-- Ghost Layer -->
            <div id="ghost-layer" class="absolute top-0 left-0 w-full h-full pointer-events-none"></div>

            <!-- Corners -->
            <div class="absolute -top-1 -left-1 w-6 h-6 border-t-4 border-l-4 border-amber-500"></div>
            <div class="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-amber-500"></div>
            <div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-amber-500"></div>
            <div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-r-4 border-amber-500"></div>
        </div>

        <!-- Inventory Area -->
        <div id="inventory-container" class="bg-slate-800/80 rounded-xl p-4 w-full md:flex-1 md:min-w-[500px] min-h-[600px] border border-slate-700 flex flex-col shrink-0">
            <div class="flex justify-between items-center mb-4 border-b border-slate-600 pb-2">
                <h2 id="inventory-title" class="text-white font-bold uppercase text-sm tracking-wider">
                    Fragments (0)
                </h2>
                <button id="btn-hint" class="px-3 py-1 bg-amber-600 hover:bg-amber-500 text-white text-xs rounded uppercase font-bold tracking-wide transition-colors shadow-lg cursor-pointer">
                    Hint 💡
                </button>
            </div>
            <div id="inventory-list" class="flex flex-wrap gap-2 justify-start items-start flex-1 content-start">
                <!-- Inventory pieces go here -->
            </div>
        </div>

    </div>

    <!-- Footer -->
    <div class="mt-8 flex gap-4 relative z-30 mb-8">
        <button id="btn-new-game" class="px-8 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded font-bold uppercase tracking-wide transition-colors border-2 border-slate-500 cursor-pointer">
            New Challenge
        </button>
        <button id="btn-submit" class="px-8 py-3 bg-emerald-700 hover:bg-emerald-600 text-white rounded font-bold uppercase tracking-wide transition-colors border-2 border-emerald-500 shadow-lg cursor-pointer active:scale-95 transform">
            提交判定
        </button>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 hidden opacity-0 transition-opacity duration-200">
        <div id="modal-content" class="bg-slate-800 border-2 rounded-xl p-8 max-w-md w-full shadow-2xl transform transition-all scale-95">
            <h3 id="modal-title" class="text-2xl font-bold mb-4">Title</h3>
            <p id="modal-message" class="text-slate-300 text-lg mb-8 whitespace-pre-line">Message</p>
            <button id="btn-modal-close" class="w-full py-3 bg-slate-700 hover:bg-slate-600 text-white rounded font-bold uppercase tracking-wide transition-colors border border-slate-500 cursor-pointer">
                Close
            </button>
        </div>
    </div>

    <script>
        // --- Constants ---
        const GRID_SIZE = 10;
        const NUM_PIECES = 10;
        const CELL_PIXEL_SIZE = 34;
        const COLORS = [
            '#F59E0B', '#D97706', '#EA580C', '#CA8A04', '#EAB308', 
            '#F97316', '#FB923C', '#FBBF24', '#FCD34D', '#fdba74'
        ];

        // --- State ---
        let state = {
            pieces: [],
            isGameActive: false,
            timeElapsed: 0,
            draggingPieceId: null,
            dragOffset: { x: 0, y: 0 },
            ghostPos: null,
            timerInterval: null
        };

        // --- DOM Elements ---
        const els = {
            timer: document.getElementById('timer'),
            boardContainer: document.getElementById('board-container'),
            gridBackground: document.getElementById('grid-background'),
            boardPiecesLayer: document.getElementById('board-pieces-layer'),
            ghostLayer: document.getElementById('ghost-layer'),
            inventoryList: document.getElementById('inventory-list'),
            inventoryTitle: document.getElementById('inventory-title'),
            btnHint: document.getElementById('btn-hint'),
            btnNewGame: document.getElementById('btn-new-game'),
            btnSubmit: document.getElementById('btn-submit'),
            modal: document.getElementById('modal'),
            modalContent: document.getElementById('modal-content'),
            modalTitle: document.getElementById('modal-title'),
            modalMessage: document.getElementById('modal-message'),
            btnModalClose: document.getElementById('btn-modal-close')
        };

        // --- Helper Functions ---

        const decomposeToSquares = (cells) => {
            if (cells.length === 0) return [];
            const xs = cells.map(c => c.x);
            const ys = cells.map(c => c.y);
            const minX = Math.min(...xs);
            const maxX = Math.max(...xs);
            const minY = Math.min(...ys);
            const maxY = Math.max(...ys);
            const width = maxX - minX + 1;
            const height = maxY - minY + 1;

            const map = Array(height).fill(false).map(() => Array(width).fill(false));
            cells.forEach(c => {
                map[c.y - minY][c.x - minX] = true;
            });

            const squares = [];
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    if (map[y][x]) {
                        let maxSize = 1;
                        while (true) {
                            const nextSize = maxSize + 1;
                            if (y + nextSize > height || x + nextSize > width) break;
                            let clean = true;
                            for (let i = 0; i < nextSize; i++) {
                                if (!map[y + nextSize - 1][x + i] || !map[y + i][x + nextSize - 1]) {
                                    clean = false;
                                    break;
                                }
                            }
                            if (clean) maxSize = nextSize;
                            else break;
                        }
                        squares.push({ x: x + minX, y: y + minY, size: maxSize });
                        for (let dy = 0; dy < maxSize; dy++) {
                            for (let dx = 0; dx < maxSize; dx++) {
                                map[y + dy][x + dx] = false;
                            }
                        }
                    }
                }
            }
            return squares;
        };

        const ensureContiguity = (grid) => {
            let changed = true;
            while (changed) {
                changed = false;
                for (let id = 0; id < NUM_PIECES; id++) {
                    const cells = [];
                    for(let y=0; y<GRID_SIZE; y++) {
                        for(let x=0; x<GRID_SIZE; x++) {
                            if (grid[y][x] === id) cells.push({x, y});
                        }
                    }
                    if (cells.length === 0) continue;

                    const visited = new Set();
                    const components = [];
                    
                    for (const cell of cells) {
                        const key = `${cell.x},${cell.y}`;
                        if (visited.has(key)) continue;

                        const component = [];
                        const queue = [cell];
                        visited.add(key);
                        
                        while (queue.length > 0) {
                            const curr = queue.shift();
                            component.push(curr);
                            const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]];
                            for (const [dy, dx] of dirs) {
                                const nx = curr.x + dx;
                                const ny = curr.y + dy;
                                const nKey = `${nx},${ny}`;
                                if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE && 
                                    grid[ny][nx] === id && !visited.has(nKey)) {
                                    visited.add(nKey);
                                    queue.push({x: nx, y: ny});
                                }
                            }
                        }
                        components.push(component);
                    }

                    if (components.length > 1) {
                        components.sort((a, b) => b.length - a.length);
                        for (let i = 1; i < components.length; i++) {
                            const toReassign = components[i];
                            for (const cell of toReassign) {
                                const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]];
                                let newId = -1;
                                for (const [dy, dx] of dirs) {
                                    const nx = cell.x + dx;
                                    const ny = cell.y + dy;
                                    if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE && grid[ny][nx] !== id) {
                                        newId = grid[ny][nx];
                                        break;
                                    }
                                }
                                if (newId !== -1) {
                                    grid[cell.y][cell.x] = newId;
                                    changed = true;
                                }
                            }
                        }
                    }
                }
            }
        };

        const generatePuzzle = () => {
            const grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(-1));
            let seeds = [];
            while (seeds.length < NUM_PIECES) {
                const x = Math.floor(Math.random() * GRID_SIZE);
                const y = Math.floor(Math.random() * GRID_SIZE);
                if (grid[y][x] === -1) {
                    const tooClose = seeds.some(s => Math.abs(s.x - x) + Math.abs(s.y - y) < 2);
                    if (!tooClose || seeds.length > 8) {
                        grid[y][x] = seeds.length;
                        seeds.push({ x, y });
                    }
                }
            }

            let changed = true;
            while (changed) {
                changed = false;
                const pieceOrder = Array.from({ length: NUM_PIECES }, (_, i) => i).sort(() => Math.random() - 0.5);
                
                for (const pieceId of pieceOrder) {
                    const candidates = [];
                    for (let y = 0; y < GRID_SIZE; y++) {
                        for (let x = 0; x < GRID_SIZE; x++) {
                            if (grid[y][x] === -1) {
                                const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]];
                                let neighborsOfSameId = 0;
                                let hasNeighbor = false;
                                for (const [dy, dx] of dirs) {
                                    const ny = y + dy;
                                    const nx = x + dx;
                                    if (ny >= 0 && ny < GRID_SIZE && nx >= 0 && nx < GRID_SIZE) {
                                        if (grid[ny][nx] === pieceId) {
                                            hasNeighbor = true;
                                            neighborsOfSameId++;
                                        }
                                    }
                                }
                                if (hasNeighbor) {
                                    candidates.push({ x, y, score: neighborsOfSameId });
                                }
                            }
                        }
                    }
                    if (candidates.length > 0) {
                        candidates.sort((a, b) => b.score - a.score || Math.random() - 0.5);
                        const pick = candidates[0];
                        grid[pick.y][pick.x] = pieceId;
                        changed = true;
                    }
                }
            }

            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (grid[y][x] === -1) {
                        const neighbors = [[0, 1], [0, -1], [1, 0], [-1, 0]];
                        for (const [dy, dx] of neighbors) {
                            const ny = y + dy;
                            const nx = x + dx;
                            if (ny >= 0 && ny < GRID_SIZE && nx >= 0 && nx < GRID_SIZE && grid[ny][nx] !== -1) {
                                grid[y][x] = grid[ny][nx];
                                break;
                            }
                        }
                        if (grid[y][x] === -1) grid[y][x] = 0;
                    }
                }
            }

            ensureContiguity(grid);

            const pieces = [];
            for (let id = 0; id < NUM_PIECES; id++) {
                const rawCells = [];
                let minX = GRID_SIZE, maxX = 0, minY = GRID_SIZE, maxY = 0;

                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        if (grid[y][x] === id) {
                            rawCells.push({ x, y });
                            minX = Math.min(minX, x);
                            maxX = Math.max(maxX, x);
                            minY = Math.min(minY, y);
                            maxY = Math.max(maxY, y);
                        }
                    }
                }

                const normalizedCells = rawCells.map(c => ({ x: c.x - minX, y: c.y - minY }));
                const squares = decomposeToSquares(normalizedCells);

                pieces.push({
                    id,
                    color: COLORS[id % COLORS.length],
                    cells: normalizedCells,
                    squares: squares,
                    position: null,
                    solution: { x: minX, y: minY },
                    width: maxX - minX + 1,
                    height: maxY - minY + 1
                });
            }
            return pieces;
        };

        // --- UI Rendering ---

        const createPieceElement = (piece, isInventory, isGhost = false) => {
            const container = document.createElement('div');
            const width = piece.width * CELL_PIXEL_SIZE;
            const height = piece.height * CELL_PIXEL_SIZE;
            
            container.className = isGhost ? 'ghost absolute' : 'piece-container absolute cursor-grab active:cursor-grabbing';
            if (isInventory && !isGhost) {
                container.className = 'piece-container relative cursor-grab active:cursor-grabbing hover:-translate-y-1 transition-all';
                container.style.margin = '12px';
            }

            container.style.width = `${width}px`;
            container.style.height = `${height}px`;
            
            if (isGhost) {
                container.style.opacity = '0.4';
                container.style.zIndex = '5';
            } else {
                container.style.zIndex = '10';
                container.draggable = true;
                container.dataset.id = piece.id;
                
                // Drag Events
                container.addEventListener('dragstart', (e) => {
                    state.draggingPieceId = piece.id;
                    const rect = container.getBoundingClientRect();
                    const relX = Math.floor((e.clientX - rect.left) / CELL_PIXEL_SIZE);
                    const relY = Math.floor((e.clientY - rect.top) / CELL_PIXEL_SIZE);
                    
                    // Clamp relative click to piece bounds
                    const validX = Math.max(0, Math.min(relX, piece.width - 1));
                    const validY = Math.max(0, Math.min(relY, piece.height - 1));
                    
                    state.dragOffset = { x: validX, y: validY };
                    e.dataTransfer.effectAllowed = "move";
                    // Set a transparent image or the element itself as drag image
                    // e.dataTransfer.setDragImage(container, validX * CELL_PIXEL_SIZE + CELL_PIXEL_SIZE/2, validY * CELL_PIXEL_SIZE + CELL_PIXEL_SIZE/2);
                    
                    // Delay adding class to avoid hiding original immediately if needed, 
                    // but here we want the original to stay visible until dropped usually, 
                    // or maybe fade it. React version didn't hide it.
                    setTimeout(() => container.style.opacity = '0.5', 0);
                });

                container.addEventListener('dragend', (e) => {
                    container.style.opacity = '1';
                    state.draggingPieceId = null;
                    state.ghostPos = null;
                    renderGhost();
                });
            }

            piece.squares.forEach(sq => {
                const squareDiv = document.createElement('div');
                squareDiv.className = `absolute border flex items-center justify-center font-mono font-bold text-slate-900 select-none pointer-events-none`;
                squareDiv.className += isGhost ? ' border-white/50' : ' border-slate-900/50';
                
                squareDiv.style.left = `${sq.x * CELL_PIXEL_SIZE}px`;
                squareDiv.style.top = `${sq.y * CELL_PIXEL_SIZE}px`;
                squareDiv.style.width = `${sq.size * CELL_PIXEL_SIZE}px`;
                squareDiv.style.height = `${sq.size * CELL_PIXEL_SIZE}px`;
                squareDiv.style.backgroundColor = isGhost ? '#fbbf24' : piece.color;
                if (!isGhost) squareDiv.style.boxShadow = 'inset 0 0 10px rgba(0,0,0,0.1)';
                squareDiv.style.fontSize = `${Math.max(12, sq.size * 14)}px`;
                squareDiv.textContent = sq.size;
                
                container.appendChild(squareDiv);
            });

            return container;
        };

        const renderBoard = () => {
            // Clear pieces layer
            els.boardPiecesLayer.innerHTML = '';
            
            // Render placed pieces
            state.pieces.filter(p => p.position !== null).forEach(piece => {
                const el = createPieceElement(piece, false);
                el.style.left = `${piece.position.x * CELL_PIXEL_SIZE}px`;
                el.style.top = `${piece.position.y * CELL_PIXEL_SIZE}px`;
                els.boardPiecesLayer.appendChild(el);
            });
        };

        const renderInventory = () => {
            els.inventoryList.innerHTML = '';
            const unplaced = state.pieces.filter(p => p.position === null);
            els.inventoryTitle.textContent = `Fragments (${unplaced.length})`;
            
            unplaced.forEach(piece => {
                const el = createPieceElement(piece, true);
                els.inventoryList.appendChild(el);
            });
        };

        const renderGhost = () => {
            els.ghostLayer.innerHTML = '';
            if (state.ghostPos && state.draggingPieceId !== null) {
                const piece = state.pieces.find(p => p.id === state.draggingPieceId);
                if (piece) {
                    const el = createPieceElement(piece, false, true);
                    el.style.left = `${state.ghostPos.x * CELL_PIXEL_SIZE}px`;
                    el.style.top = `${state.ghostPos.y * CELL_PIXEL_SIZE}px`;
                    els.ghostLayer.appendChild(el);
                }
            }
        };

        const updateTimer = () => {
            const mins = Math.floor(state.timeElapsed / 60).toString().padStart(2, '0');
            const secs = (state.timeElapsed % 60).toString().padStart(2, '0');
            els.timer.textContent = `⏱ ${mins}:${secs}`;
        };

        const showModal = (title, message, type) => {
            els.modalTitle.textContent = title;
            els.modalMessage.textContent = message;
            els.modalTitle.className = `text-2xl font-bold mb-4 ${type === 'success' ? 'text-amber-500' : 'text-white'}`;
            els.modalContent.className = `bg-slate-800 border-2 ${type === 'success' ? 'border-amber-500' : 'border-slate-600'} rounded-xl p-8 max-w-md w-full shadow-2xl transform transition-all scale-100`;
            
            els.modal.classList.remove('hidden');
            // Trigger reflow
            void els.modal.offsetWidth;
            els.modal.classList.remove('opacity-0');
        };

        const hideModal = () => {
            els.modal.classList.add('opacity-0');
            setTimeout(() => {
                els.modal.classList.add('hidden');
            }, 200);
        };

        // --- Game Logic ---

        const checkVictory = () => {
            if (!state.isGameActive || state.pieces.length === 0) return;

            const allPlaced = state.pieces.every(p => p.position !== null);
            if (!allPlaced) return;

            const grid = new Set();
            let overlap = false;
            for (const p of state.pieces) {
                if (!p.position) continue;
                for (const cell of p.cells) {
                    const key = `${p.position.x + cell.x},${p.position.y + cell.y}`;
                    if (grid.has(key)) {
                        overlap = true;
                        break;
                    }
                    grid.add(key);
                }
                if (overlap) break;
            }

            if (!overlap && grid.size === GRID_SIZE * GRID_SIZE) {
                state.isGameActive = false;
                showModal("挑战成功", "红方选手张天扬守擂成功\n【通关密钥】为301", 'success');
            }
        };

        const startNewGame = () => {
            state.pieces = generatePuzzle();
            state.timeElapsed = 0;
            state.isGameActive = true;
            state.draggingPieceId = null;
            state.ghostPos = null;
            
            renderBoard();
            renderInventory();
            updateTimer();
            hideModal();
            
            if (state.timerInterval) clearInterval(state.timerInterval);
            state.timerInterval = setInterval(() => {
                if (state.isGameActive) {
                    state.timeElapsed++;
                    updateTimer();
                }
            }, 1000);
        };

        // --- Event Handlers ---

        const handleDragOver = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";

            if (state.draggingPieceId === null) return;

            const rect = els.boardContainer.getBoundingClientRect();
            // Adjust for border/padding if necessary, but getBoundingClientRect includes padding
            // The grid starts inside the padding. 
            // The board container has p-2 (8px).
            // Let's assume the grid starts at roughly 8px offset. 
            // Better: use the grid-background element for calculation if possible, 
            // but board-container is the drop target.
            
            // Actually, let's use the grid background rect for calculation to be precise
            const gridRect = els.gridBackground.getBoundingClientRect();
            
            const x = Math.floor((e.clientX - gridRect.left) / CELL_PIXEL_SIZE);
            const y = Math.floor((e.clientY - gridRect.top) / CELL_PIXEL_SIZE);

            const targetX = x - state.dragOffset.x;
            const targetY = y - state.dragOffset.y;

            if (state.ghostPos && state.ghostPos.x === targetX && state.ghostPos.y === targetY) return;

            const piece = state.pieces.find(p => p.id === state.draggingPieceId);
            if (!piece) return;

            let isValid = true;
            for (const cell of piece.cells) {
                const absX = targetX + cell.x;
                const absY = targetY + cell.y;
                if (absX < 0 || absX >= GRID_SIZE || absY < 0 || absY >= GRID_SIZE) {
                    isValid = false;
                    break;
                }
            }

            if (isValid) {
                for (const other of state.pieces) {
                    if (other.id === state.draggingPieceId || !other.position) continue;
                    for (const myCell of piece.cells) {
                        const myAbsX = targetX + myCell.x;
                        const myAbsY = targetY + myCell.y;
                        for (const otherCell of other.cells) {
                            const otherAbsX = other.position.x + otherCell.x;
                            const otherAbsY = other.position.y + otherCell.y;
                            if (myAbsX === otherAbsX && myAbsY === otherAbsY) {
                                isValid = false;
                                break;
                            }
                        }
                        if (!isValid) break;
                    }
                    if (!isValid) break;
                }
            }

            if (isValid) {
                state.ghostPos = { x: targetX, y: targetY };
            } else {
                state.ghostPos = null;
            }
            renderGhost();
        };

        const handleDropOnGrid = (e) => {
            e.preventDefault();
            state.ghostPos = null;
            renderGhost();

            if (state.draggingPieceId === null) return;

            const gridRect = els.gridBackground.getBoundingClientRect();
            const x = Math.floor((e.clientX - gridRect.left) / CELL_PIXEL_SIZE);
            const y = Math.floor((e.clientY - gridRect.top) / CELL_PIXEL_SIZE);
            const newX = x - state.dragOffset.x;
            const newY = y - state.dragOffset.y;

            const piece = state.pieces.find(p => p.id === state.draggingPieceId);
            if (!piece) return;

            // Validation
            let isValid = true;
            for (const cell of piece.cells) {
                const absX = newX + cell.x;
                const absY = newY + cell.y;
                if (absX < 0 || absX >= GRID_SIZE || absY < 0 || absY >= GRID_SIZE) isValid = false;
            }
            if (isValid) {
                for (const other of state.pieces) {
                    if (other.id === state.draggingPieceId || !other.position) continue;
                    for (const myCell of piece.cells) {
                        const myAbsX = newX + myCell.x;
                        const myAbsY = newY + myCell.y;
                        for (const otherCell of other.cells) {
                            const otherAbsX = other.position.x + otherCell.x;
                            const otherAbsY = other.position.y + otherCell.y;
                            if (myAbsX === otherAbsX && myAbsY === otherAbsY) isValid = false;
                        }
                    }
                }
            }

            if (isValid) {
                piece.position = { x: newX, y: newY };
                renderBoard();
                renderInventory();
                checkVictory();
            }
            state.draggingPieceId = null;
        };

        const handleDropOnInventory = (e) => {
            e.preventDefault();
            state.ghostPos = null;
            renderGhost();
            
            if (state.draggingPieceId === null) return;

            const piece = state.pieces.find(p => p.id === state.draggingPieceId);
            if (piece) {
                piece.position = null;
                renderBoard();
                renderInventory();
            }
            state.draggingPieceId = null;
        };

        const handleHint = () => {
            if (!state.isGameActive) return;
            const unplaced = state.pieces.filter(p => p.position === null);
            if (unplaced.length === 0) return;

            const randomPiece = unplaced[Math.floor(Math.random() * unplaced.length)];
            const solution = randomPiece.solution;
            const piecesToKick = [];

            state.pieces.forEach(other => {
                if (other.id === randomPiece.id || other.position === null) return;
                let intersects = false;
                for (const myCell of randomPiece.cells) {
                    const myAbsX = solution.x + myCell.x;
                    const myAbsY = solution.y + myCell.y;
                    for (const otherCell of other.cells) {
                        const otherAbsX = other.position.x + otherCell.x;
                        const otherAbsY = other.position.y + otherCell.y;
                        if (myAbsX === otherAbsX && myAbsY === otherAbsY) {
                            intersects = true;
                            break;
                        }
                    }
                    if (intersects) break;
                }
                if (intersects) piecesToKick.push(other.id);
            });

            piecesToKick.forEach(pid => {
                const p = state.pieces.find(x => x.id === pid);
                if (p) p.position = null;
            });

            randomPiece.position = solution;
            renderBoard();
            renderInventory();
            checkVictory();
        };

        const handleSubmit = () => {
            const unplaced = state.pieces.filter(p => p.position === null).length;
            if (unplaced > 0) {
                showModal("挑战未完成", `还有 ${unplaced} 个碎片未放置！`, 'info');
                return;
            }

            const grid = new Set();
            let overlap = false;
            for (const p of state.pieces) {
                if (!p.position) continue;
                for (const cell of p.cells) {
                    const key = `${p.position.x + cell.x},${p.position.y + cell.y}`;
                    if (grid.has(key)) overlap = true;
                    grid.add(key);
                }
            }

            if (!overlap && grid.size === GRID_SIZE * GRID_SIZE) {
                state.isGameActive = false;
                showModal("挑战成功", "红方选手张天扬守擂成功！\n【通关密钥】为301", 'success');
            } else {
                showModal("判定失败", "碎片存在重叠或未正确填满区域，请检查。", 'error');
            }
        };

        // --- Initialization ---

        const init = () => {
            // Setup Grid Background
            els.gridBackground.style.gridTemplateColumns = `repeat(${GRID_SIZE}, ${CELL_PIXEL_SIZE}px)`;
            els.gridBackground.style.gridTemplateRows = `repeat(${GRID_SIZE}, ${CELL_PIXEL_SIZE}px)`;
            els.gridBackground.style.width = `${GRID_SIZE * CELL_PIXEL_SIZE}px`;
            els.gridBackground.style.height = `${GRID_SIZE * CELL_PIXEL_SIZE}px`;
            
            // Set board container size to match grid + padding
            // els.boardContainer.style.width = `${GRID_SIZE * CELL_PIXEL_SIZE + 20}px`;
            // els.boardContainer.style.height = `${GRID_SIZE * CELL_PIXEL_SIZE + 20}px`;

            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'w-full h-full border border-slate-700/20';
                els.gridBackground.appendChild(cell);
            }

            // Event Listeners
            els.boardContainer.addEventListener('dragover', handleDragOver);
            els.boardContainer.addEventListener('drop', handleDropOnGrid);
            els.boardContainer.addEventListener('dragleave', (e) => {
                // Optional: clear ghost if leaving board completely
                // But dragleave fires when entering children, so handled carefully
            });

            els.inventoryList.parentElement.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = "move";
            });
            els.inventoryList.parentElement.addEventListener('drop', handleDropOnInventory);

            els.btnNewGame.addEventListener('click', startNewGame);
            els.btnSubmit.addEventListener('click', handleSubmit);
            els.btnHint.addEventListener('click', handleHint);
            els.btnModalClose.addEventListener('click', hideModal);

            // Start Game
            startNewGame();
        };

        init();

    </script>
</body>
</html>
